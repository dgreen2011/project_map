<template>
  <lightning-card title="Project Record Map" icon-name="standard:location">
    <div class="shell">
      <template if:true={isLoading}>
        <div class="spinner-wrap">
          <lightning-spinner
            size="small"
            alternative-text="Loading project record map"
          ></lightning-spinner>
        </div>
      </template>

      <template if:true={errorMessage}>
        <div class="message message-error">
          <div class="message-title">Map Error</div>
          <div>{errorMessage}</div>
        </div>
      </template>

      <template if:true={tileWarningMessage}>
        <div class="message message-warning">
          <div class="message-title">Tile Warning</div>
          <div>{tileWarningMessage}</div>
        </div>
      </template>

      <div class="toolbar">
        <div class="toolbar-left">
          <div class="toolbar-title">Sitetracker Map Layers</div>
          <template if:true={hasLayerPanels}>
            <div class="toolbar-subtitle">{mapSummaryText}</div>
          </template>
        </div>

        <div class="toolbar-right">
          <lightning-button
            label="Refresh"
            title="Reload the current project map data"
            onclick={handleRefreshClick}
            disabled={isLoading}
          ></lightning-button>
        </div>
      </div>

      <template if:true={showNoConfiguredLayers}>
        <div class="message message-info">
          Add one or more Map Layer Record Id values in the Lightning App Builder component
          settings to render layers on this Project page.
        </div>
      </template>

      <template if:true={showNoVisibleFeatures}>
        <div class="message message-info">
          No visible features matched the current layer visibility and filter selections.
        </div>
      </template>

      <div class={contentGridClass}>
        <template if:true={showSidePanel}>
          <div class="side-panel">
            <div class="side-panel-header">
              <div class="side-panel-heading">Layers</div>

              <lightning-button-icon
                icon-name={sidebarToggleIconName}
                alternative-text={sidebarToggleTitle}
                title={sidebarToggleTitle}
                onclick={handleToggleSidebar}
                disabled={isLoading}
              ></lightning-button-icon>
            </div>

            <template for:each={uiLayers} for:item="layer">
              <section key={layer.slotNumber} class="layer-card">
                <div class="layer-card-header">
                  <div class="layer-card-title-wrap">
                    <div class="layer-card-title">{layer.mapLayerName}</div>
                  </div>

                  <lightning-input
                    type="toggle"
                    variant="label-hidden"
                    label="Show Layer"
                    message-toggle-active="Shown"
                    message-toggle-inactive="Hidden"
                    checked={layer.isVisible}
                    data-slot={layer.slotNumber}
                    onchange={handleLayerVisibilityChange}
                  ></lightning-input>
                </div>

                <template if:true={layer.hasError}>
                  <div class="message message-error layer-inline-message">
                    <div class="message-title">Layer Error</div>
                    <div>{layer.errorMessage}</div>
                  </div>
                </template>

                <template if:true={layer.hasWarnings}>
                  <div class="warning-list">
                    <template for:each={layer.warnings} for:item="warning">
                      <div key={warning} class="message message-warning layer-inline-message">
                        <div>{warning}</div>
                      </div>
                    </template>
                  </div>
                </template>

                <template if:true={layer.hasFilterControl}>
                  <div class="filter-block">
                    <div class="filter-label">{layer.filterFieldLabel}</div>

                    <button
                      class="filter-trigger"
                      type="button"
                      data-slot={layer.slotNumber}
                      onclick={handleToggleFilterMenu}
                    >
                      <span class="filter-trigger-text">{layer.selectedFilterLabel}</span>
                      <span class="filter-trigger-icon">▾</span>
                    </button>

                    <template if:true={layer.isFilterMenuOpen}>
                      <div class="filter-menu">
                        <input
                          class="filter-search-input"
                          type="search"
                          placeholder="Search"
                          value={layer.filterSearchText}
                          data-slot={layer.slotNumber}
                          oninput={handleFilterSearchInput}
                        />

                        <div class="filter-option-list">
                          <template
                            for:each={layer.filteredFilterOptions}
                            for:item="filterOption"
                          >
                            <button
                              key={filterOption.value}
                              class="filter-option-button"
                              type="button"
                              data-slot={layer.slotNumber}
                              data-value={filterOption.value}
                              onclick={handleFilterOptionSelect}
                            >
                              {filterOption.label}
                            </button>
                          </template>
                        </div>
                      </div>
                    </template>
                  </div>
                </template>
              </section>
            </template>
          </div>
        </template>

        <div class="map-panel">
          <template if:true={showCollapsedSidebarHandle}>
            <div class="collapsed-sidebar-handle">
              <lightning-button-icon
                icon-name={sidebarToggleIconName}
                alternative-text={sidebarToggleTitle}
                title={sidebarToggleTitle}
                onclick={handleToggleSidebar}
                disabled={isLoading}
              ></lightning-button-icon>
            </div>
          </template>

          <div class="map-frame">
            <div data-id="map" class="map-root" style={mapStyle}></div>
          </div>
        </div>
      </div>
    </div>
  </lightning-card>

  <template if:true={isWorkLogModalOpen}>
    <section
      role="dialog"
      tabindex="-1"
      aria-modal="true"
      aria-labelledby="work-log-modal-heading"
      class="slds-modal slds-fade-in-open"
    >
      <div class="slds-modal__container work-log-modal-container">
        <header class="slds-modal__header work-log-modal-header">
          <lightning-button-icon
            class="slds-modal__close"
            icon-name="utility:close"
            alternative-text="Close"
            title="Close"
            onclick={handleCloseWorkLogModal}
            disabled={isSavingWorkLog}
          ></lightning-button-icon>

          <h2 id="work-log-modal-heading" class="slds-text-heading_medium">
            Create Work Log
          </h2>

          <template if:true={workLogTargetName}>
            <div class="work-log-modal-subtitle">
              {workLogTargetTypeLabel}: {workLogTargetName}
            </div>
          </template>
        </header>

        <div
          class="slds-modal__content slds-p-around_medium work-log-modal-body"
          id="modal-content-id-1"
        >
          <template if:true={isPreparingWorkLog}>
            <div class="work-log-modal-spinner-wrap">
              <lightning-spinner
                size="small"
                alternative-text="Preparing work log form"
              ></lightning-spinner>
            </div>
          </template>

          <template if:true={workLogContextError}>
            <div class="message message-error">
              <div class="message-title">Work Log Error</div>
              <div>{workLogContextError}</div>
            </div>
          </template>

          <template if:true={hasWorkLogContextSummary}>
            <div class="work-log-context-grid">
              <template if:true={workLogTargetName}>
                <div class="work-log-context-item">
                  <div class="work-log-context-label">{workLogTargetTypeLabel}</div>
                  <div class="work-log-context-value">{workLogTargetName}</div>
                </div>
              </template>

              <template if:true={workLogProjectName}>
                <div class="work-log-context-item">
                  <div class="work-log-context-label">Project</div>
                  <div class="work-log-context-value">{workLogProjectName}</div>
                </div>
              </template>

              <template if:true={workLogPlaName}>
                <div class="work-log-context-item">
                  <div class="work-log-context-label">Production Line Allocation</div>
                  <div class="work-log-context-value">{workLogPlaName}</div>
                </div>
              </template>

              <template if:true={workLogServiceName}>
                <div class="work-log-context-item">
                  <div class="work-log-context-label">Service</div>
                  <div class="work-log-context-value">{workLogServiceName}</div>
                </div>
              </template>
            </div>
          </template>

          <template if:true={showWorkLogForm}>
            <template if:true={workLogSaveError}>
              <div class="message message-error work-log-inline-message">
                <div class="message-title">Save Error</div>
                <div>{workLogSaveError}</div>
              </div>
            </template>

            <lightning-record-edit-form
              object-api-name="sitetracker__Production_Work_Log__c"
              onsuccess={handleWorkLogFormSuccess}
              onerror={handleWorkLogFormError}
            >
              <lightning-messages></lightning-messages>

              <div class="work-log-field-grid">
                <template for:each={workLogVisibleFields} for:item="fieldItem">
                  <div key={fieldItem.apiName} class="work-log-field-cell">
                    <lightning-input-field
                      field-name={fieldItem.apiName}
                      value={fieldItem.value}
                    ></lightning-input-field>
                  </div>
                </template>
              </div>

              <template for:each={workLogHiddenFields} for:item="fieldItem">
                <div key={fieldItem.apiName} class="slds-hide">
                  <lightning-input-field
                    field-name={fieldItem.apiName}
                    value={fieldItem.value}
                  ></lightning-input-field>
                </div>
              </template>

              <footer class="slds-modal__footer work-log-modal-footer">
                <lightning-button
                  label="Cancel"
                  onclick={handleCloseWorkLogModal}
                  disabled={isSavingWorkLog}
                ></lightning-button>

                <lightning-button
                  class="slds-m-left_small"
                  variant="brand"
                  type="submit"
                  label={workLogSaveButtonLabel}
                  disabled={isSavingWorkLog}
                ></lightning-button>
              </footer>
            </lightning-record-edit-form>
          </template>

          <template if:true={showWorkLogUploadStep}>
            <template if:true={workLogSuccessMessage}>
              <div class="message message-success work-log-inline-message">
                <div class="message-title">Work Log Created</div>
                <div>{workLogSuccessMessage}</div>
              </div>
            </template>

            <div class="work-log-upload-section">
              <div class="work-log-upload-heading">Upload files</div>
              <div class="work-log-upload-help">
                Files uploaded here will be linked to the new Work Log and to the selected
                {workLogTargetTypeLabelLower}.
              </div>

              <lightning-file-upload
                name="projectRecordMapWorkLogUploader"
                label="Add files"
                record-id={createdWorkLogId}
                multiple
                onuploadfinished={handleWorkLogUploadFinished}
                disabled={isLinkingUploadedFiles}
              ></lightning-file-upload>

              <template if:true={isLinkingUploadedFiles}>
                <div class="work-log-upload-spinner-wrap">
                  <lightning-spinner
                    size="small"
                    alternative-text="Linking uploaded files"
                  ></lightning-spinner>
                </div>
              </template>

              <template if:true={workLogUploadMessage}>
                <div class="message message-info work-log-inline-message">
                  <div>{workLogUploadMessage}</div>
                </div>
              </template>
            </div>

            <div class="work-log-created-actions">
              <lightning-button
                label="Open Work Log"
                title="Open the newly created Work Log in a new tab"
                onclick={handleOpenCreatedWorkLog}
              ></lightning-button>

              <lightning-button
                class="slds-m-left_small"
                variant="brand"
                label="Done"
                onclick={handleCloseWorkLogModal}
              ></lightning-button>
            </div>
          </template>
        </div>
      </div>
    </section>

    <div class="slds-backdrop slds-backdrop_open work-log-modal-backdrop"></div>
  </template>
</template>
