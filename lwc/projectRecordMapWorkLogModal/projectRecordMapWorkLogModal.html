<template>
  <section
    role="dialog"
    tabindex="-1"
    aria-modal="true"
    aria-labelledby="project-record-map-work-log-heading"
    class="slds-modal slds-fade-in-open"
  >
    <div class="slds-modal__container prm-work-log-modal-container">
      <header class="slds-modal__header prm-work-log-modal-header">
        <lightning-button-icon
          class="slds-modal__close"
          icon-name="utility:close"
          alternative-text="Close"
          title="Close"
          onclick={handleCloseClick}
          disabled={isSavingWorkLog}
        ></lightning-button-icon>

        <h2
          id="project-record-map-work-log-heading"
          class="slds-text-heading_medium prm-work-log-modal-title"
        >
          Create Work Log
        </h2>

        <template if:true={showWorkLogTargetLink}>
          <div class="prm-work-log-modal-subtitle">
            <span>{workLogTargetTypeLabel}: </span>
            <a
              href={workLogTargetRecordUrl}
              target="_blank"
              rel="noopener noreferrer"
              class="prm-work-log-target-link"
            >
              {workLogTargetName}
            </a>
          </div>
        </template>

        <template if:false={showWorkLogTargetLink}>
          <template if:true={workLogTargetName}>
            <div class="prm-work-log-modal-subtitle">
              {workLogTargetTypeLabel}: {workLogTargetName}
            </div>
          </template>
        </template>
      </header>

      <div class="slds-modal__content prm-work-log-modal-body" id="project-record-map-work-log-body">
        <template if:true={isPreparingWorkLog}>
          <div class="prm-work-log-spinner-wrap">
            <lightning-spinner
              size="small"
              alternative-text="Preparing work log form"
            ></lightning-spinner>
          </div>
        </template>

        <template if:true={workLogContextError}>
          <div class="message message-error">
            <div class="message-title">Work Log Error</div>
            <div>{workLogContextError}</div>
          </div>
        </template>

        <template if:true={showWorkLogWarnings}>
          <div class="prm-work-log-warning-list">
            <template for:each={workLogWarnings} for:item="warning">
              <div key={warning} class="message message-warning">
                <div>{warning}</div>
              </div>
            </template>
          </div>
        </template>

        <template if:true={showWorkLogForm}>
          <template if:true={showTargetDetailFields}>
            <div class="prm-work-log-target-detail-grid">
              <template for:each={targetDetailFields} for:item="fieldItem">
                <div key={fieldItem.apiName} class="prm-work-log-target-detail-item">
                  <div class="prm-work-log-target-detail-label">{fieldItem.label}</div>
                  <div class="prm-work-log-target-detail-value">{fieldItem.displayValue}</div>
                </div>
              </template>
            </div>
          </template>

          <template if:true={workLogSaveError}>
            <div class="message message-error prm-work-log-inline-message">
              <div class="message-title">Save Error</div>
              <div>{workLogSaveError}</div>
            </div>
          </template>

          <template if:true={showSegmentPathEditor}>
            <div class="prm-work-log-segment-editor-wrap">
              <c-project-record-map-segment-path-editor
                segment-name={workLogTargetName}
                segment-geometry-raw={segmentGeometryRaw}
                onselectionchange={handleSegmentPathSelectionChange}
              ></c-project-record-map-segment-path-editor>
            </div>
          </template>

          <template if:true={showSegmentGeometryWarning}>
            <div class="message message-warning prm-work-log-inline-message">
              <div class="message-title">Segment Path Unavailable</div>
              <div>
                This Segment does not currently have GIS path geometry available, so partial completion
                drawing cannot be shown for this Work Log.
              </div>
            </div>
          </template>

          <lightning-record-edit-form
            object-api-name="sitetracker__Production_Work_Log__c"
            onsuccess={handleWorkLogFormSuccess}
            onerror={handleWorkLogFormError}
          >
            <lightning-messages></lightning-messages>

            <div class="prm-work-log-field-grid">
              <template for:each={workLogVisibleFields} for:item="fieldItem">
                <div key={fieldItem.key} class="prm-work-log-field-cell">
                  <lightning-input-field
                    data-field-scope="visible"
                    field-name={fieldItem.apiName}
                    value={fieldItem.value}
                    required={fieldItem.isRequired}
                    onchange={handleWorkLogFieldChange}
                  ></lightning-input-field>
                </div>
              </template>
            </div>

            <template for:each={workLogHiddenFields} for:item="fieldItem">
              <div key={fieldItem.key} class="slds-hide">
                <lightning-input-field
                  field-name={fieldItem.apiName}
                  value={fieldItem.value}
                ></lightning-input-field>
              </div>
            </template>
          </lightning-record-edit-form>

          <div class="prm-work-log-upload-section">
            <div class="prm-work-log-upload-heading">Files</div>

            <lightning-input
              type="file"
              name="projectRecordMapPendingFiles"
              label="Add files"
              multiple
              onchange={handlePendingFilesChange}
              disabled={isSavingWorkLog}
            ></lightning-input>

            <template if:true={showPendingUploadFiles}>
              <div class="prm-work-log-pending-file-list">
                <template for:each={pendingUploadFiles} for:item="fileItem">
                  <div key={fileItem.key} class="prm-work-log-pending-file-item">
                    <div class="prm-work-log-pending-file-name">{fileItem.name}</div>
                    <div class="prm-work-log-pending-file-meta">{fileItem.sizeLabel}</div>
                  </div>
                </template>
              </div>
            </template>

            <template if:true={workLogUploadMessage}>
              <div class="message message-info prm-work-log-inline-message">
                <div>{workLogUploadMessage}</div>
              </div>
            </template>

            <template if:true={isLinkingUploadedFiles}>
              <div class="prm-work-log-spinner-wrap">
                <lightning-spinner
                  size="small"
                  alternative-text="Uploading files"
                ></lightning-spinner>
              </div>
            </template>
          </div>
        </template>

        <template if:true={showWorkLogUploadStep}>
          <template if:true={workLogSuccessMessage}>
            <div class="message message-success prm-work-log-inline-message">
              <div class="message-title">Work Log Created</div>
              <div>{workLogSuccessMessage}</div>
            </div>
          </template>

          <template if:true={workLogUploadMessage}>
            <div class="message message-info prm-work-log-inline-message">
              <div>{workLogUploadMessage}</div>
            </div>
          </template>

          <template if:true={isLinkingUploadedFiles}>
            <div class="prm-work-log-spinner-wrap">
              <lightning-spinner
                size="small"
                alternative-text="Uploading files"
              ></lightning-spinner>
            </div>
          </template>
        </template>
      </div>

      <template if:true={showWorkLogForm}>
        <footer class="slds-modal__footer prm-work-log-modal-footer">
          <div class="prm-work-log-modal-footer-actions">
            <lightning-button
              label="Cancel"
              onclick={handleCloseClick}
              disabled={isSavingWorkLog}
            ></lightning-button>

            <lightning-button
              variant="brand"
              label={workLogSaveButtonLabel}
              onclick={handleSubmitWorkLog}
              disabled={isSavingWorkLog}
            ></lightning-button>
          </div>
        </footer>
      </template>

      <template if:true={showWorkLogUploadStep}>
        <footer class="slds-modal__footer prm-work-log-modal-footer">
          <div class="prm-work-log-modal-footer-actions">
            <lightning-button
              label="Open Work Log"
              title="Open the newly created Work Log in a new tab"
              onclick={handleOpenCreatedWorkLog}
            ></lightning-button>

            <lightning-button
              variant="brand"
              label="Done"
              onclick={handleCloseClick}
            ></lightning-button>
          </div>
        </footer>
      </template>

      <template if:true={showCloseOnlyFooter}>
        <footer class="slds-modal__footer prm-work-log-modal-footer">
          <div class="prm-work-log-modal-footer-actions">
            <lightning-button label="Close" onclick={handleCloseClick}></lightning-button>
          </div>
        </footer>
      </template>
    </div>
  </section>

  <div class="slds-backdrop slds-backdrop_open prm-work-log-modal-backdrop"></div>
</template>
