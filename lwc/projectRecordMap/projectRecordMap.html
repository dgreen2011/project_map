<template>
  <lightning-card title="Project Record Map" icon-name="standard:location">
    <div class="shell">
      <template if:true={showInitialLoadingOverlay}>
        <div class="initial-loading-overlay" aria-live="polite">
          <div class="initial-loading-text">Loading...</div>
        </div>
      </template>

      <div class={contentSurfaceClass}>
        <template if:true={showInlineSpinner}>
          <div class="spinner-wrap">
            <lightning-spinner
              size="small"
              alternative-text="Loading project record map"
            ></lightning-spinner>
          </div>
        </template>

        <template if:true={errorMessage}>
          <div class="message message-error">
            <div class="message-title">Map Error</div>
            <div>{errorMessage}</div>
          </div>
        </template>

        <template if:true={tileWarningMessage}>
          <div class="message message-warning">
            <div class="message-title">Tile Warning</div>
            <div>{tileWarningMessage}</div>
          </div>
        </template>

        <div class="toolbar">
          <div class="toolbar-left">
            <div class="toolbar-title">Sitetracker Map Layers</div>
            <template if:true={hasConfiguredLayers}>
              <div class="toolbar-subtitle">{mapSummaryText}</div>
            </template>
          </div>

          <div class="toolbar-right">
            <lightning-button
              label="Refresh"
              title="Reload the current project map data"
              onclick={handleRefreshClick}
              disabled={isLoading}
            ></lightning-button>
          </div>
        </div>

        <template if:true={showNoConfiguredLayers}>
          <div class="message message-info">
            No Map Layers are currently available for the Project Map. Add supported Sitetracker
            Map Layer records and use the Default Layer on Project Map checkbox when you want a
            layer to appear automatically in the pane.
          </div>
        </template>

        <template if:true={showNoSelectedLayers}>
          <div class="message message-info">
            Add one or more layers from the left panel to display them on the map.
          </div>
        </template>

        <template if:true={showNoVisibleFeatures}>
          <div class="message message-info">
            No visible features matched the current layer selections and filter choices.
          </div>
        </template>

        <div class={contentGridClass}>
          <template if:true={showSidePanel}>
            <div class="side-panel">
              <div class="side-panel-header">
                <div class="side-panel-heading">Layers</div>

                <lightning-button-icon
                  icon-name={sidebarToggleIconName}
                  alternative-text={sidebarToggleTitle}
                  title={sidebarToggleTitle}
                  onclick={handleToggleSidebar}
                  disabled={isLoading}
                ></lightning-button-icon>
              </div>

              <template if:true={hasSelectedLayers}>
                <div class="side-panel-section">
                  <div class="side-panel-section-heading">Shown in Pane</div>

                  <template for:each={uiLayers} for:item="layer">
                    <section key={layer.mapLayerId} class="layer-card">
                      <div class="layer-card-header">
                        <div class="layer-card-title-wrap">
                          <div class="layer-card-title-row">
                            <div class="layer-card-title">{layer.mapLayerName}</div>

                            <template if:true={layer.isDefaultSelected}>
                              <span class="layer-default-badge">Default</span>
                            </template>
                          </div>

                          <div class="layer-card-subtitle">
                            {layer.visibleFeatureCount} visible feature(s)
                          </div>
                        </div>

                        <div class="layer-card-actions">
                          <template if:true={layer.hasFilterControl}>
                            <button
                              class="layer-icon-button"
                              type="button"
                              data-layer-id={layer.mapLayerId}
                              data-filter-trigger="true"
                              onclick={handleToggleFilterPanel}
                              title="Adjust layer filters"
                              aria-label="Adjust layer filters"
                            >
                              <lightning-icon
                                icon-name="utility:filterList"
                                size="x-small"
                                alternative-text="Filters"
                              ></lightning-icon>
                            </button>
                          </template>

                          <button
                            class="layer-visibility-button layer-visibility-button-visible"
                            type="button"
                            data-layer-id={layer.mapLayerId}
                            onclick={handleRemoveLayerFromPane}
                            title="Remove layer from pane"
                            aria-label="Remove layer from pane"
                          >
                            Remove
                          </button>
                        </div>
                      </div>

                      <template if:true={layer.hasFilterControl}>
                        <div class="layer-filter-summary-row">
                          <div class="layer-filter-summary-label">Filters</div>
                          <div class="layer-filter-summary-value">{layer.filterSummaryText}</div>
                        </div>
                      </template>

                      <template if:true={layer.hasError}>
                        <div class="message message-error layer-inline-message">
                          <div class="message-title">Layer Error</div>
                          <div>{layer.errorMessage}</div>
                        </div>
                      </template>

                      <template if:true={layer.hasWarnings}>
                        <div class="warning-list">
                          <template for:each={layer.warnings} for:item="warning">
                            <div key={warning} class="message message-warning layer-inline-message">
                              <div>{warning}</div>
                            </div>
                          </template>
                        </div>
                      </template>

                      <template if:true={layer.isFilterPanelOpen}>
                        <div class="layer-filter-panel" data-filter-panel="true">
                          <div class="layer-filter-panel-header">
                            <div class="layer-filter-panel-title">Layer Filters</div>

                            <button
                              class="layer-filter-clear-button"
                              type="button"
                              data-layer-id={layer.mapLayerId}
                              onclick={handleClearLayerFilters}
                              title="Clear all filters"
                              aria-label="Clear all filters"
                            >
                              Clear
                            </button>
                          </div>

                          <template for:each={layer.filterFields} for:item="filterField">
                            <template if:true={filterField.hasOptions}>
                              <section key={filterField.fieldPath} class="layer-filter-group">
                                <div class="layer-filter-group-header">
                                  <div class="layer-filter-field-label">{filterField.fieldLabel}</div>

                                  <template if:true={filterField.hasSelectedValues}>
                                    <div class="layer-filter-field-summary">
                                      {filterField.selectedSummaryText}
                                    </div>
                                  </template>
                                </div>

                                <div class="layer-filter-option-list">
                                  <template for:each={filterField.options} for:item="option">
                                    <label key={option.value} class="layer-filter-option">
                                      <input
                                        type="checkbox"
                                        checked={option.checked}
                                        data-layer-id={layer.mapLayerId}
                                        data-field-path={filterField.fieldPath}
                                        data-value={option.value}
                                        onchange={handleLayerFilterOptionChange}
                                      />
                                      <span>{option.label}</span>
                                    </label>
                                  </template>
                                </div>
                              </section>
                            </template>
                          </template>
                        </div>
                      </template>
                    </section>
                  </template>
                </div>
              </template>

              <template if:true={hasAvailableLayersToAdd}>
                <div class="side-panel-section">
                  <div class="side-panel-section-heading">Available to Add</div>

                  <template for:each={availableLayersToAdd} for:item="layer">
                    <section key={layer.mapLayerId} class="layer-card layer-card-available">
                      <div class="layer-card-header">
                        <div class="layer-card-title-wrap">
                          <div class="layer-card-title-row">
                            <div class="layer-card-title">{layer.mapLayerName}</div>

                            <template if:true={layer.isDefaultSelected}>
                              <span class="layer-default-badge">Default</span>
                            </template>
                          </div>
                        </div>

                        <div class="layer-card-actions">
                          <button
                            class="layer-visibility-button layer-visibility-button-hidden"
                            type="button"
                            data-layer-id={layer.mapLayerId}
                            onclick={handleAddLayerToPane}
                            title="Add layer to pane"
                            aria-label="Add layer to pane"
                          >
                            Add
                          </button>
                        </div>
                      </div>
                    </section>
                  </template>
                </div>
              </template>
            </div>
          </template>

          <template if:true={showInlineMapPanel}>
            <div class="map-panel">
              <template if:true={showCollapsedSidebarHandle}>
                <div class="collapsed-sidebar-handle">
                  <lightning-button-icon
                    icon-name={sidebarToggleIconName}
                    alternative-text={sidebarToggleTitle}
                    title={sidebarToggleTitle}
                    onclick={handleToggleSidebar}
                    disabled={isLoading}
                  ></lightning-button-icon>
                </div>
              </template>

              <div class="map-overlay-actions">
                <button
                  class="map-expand-button map-lasso-button"
                  type="button"
                  title={lassoButtonTitle}
                  aria-label={lassoButtonTitle}
                  onclick={handleToggleLassoMode}
                  disabled={isLassoButtonDisabled}
                >
                  <span class="map-expand-button-icon" aria-hidden="true">{lassoButtonIcon}</span>
                </button>

                <button
                  class="map-expand-button"
                  type="button"
                  title={mapExpandButtonTitle}
                  aria-label={mapExpandButtonTitle}
                  onclick={handleToggleMapExpanded}
                >
                  <span class="map-expand-button-icon" aria-hidden="true">{mapExpandButtonIcon}</span>
                </button>
              </div>

              <div class="map-frame">
                <div data-id="map" class="map-root" style={mapStyle} lwc:dom="manual"></div>
              </div>
            </div>
          </template>
        </div>
      </div>
    </div>
  </lightning-card>

  <template if:true={isMapExpanded}>
    <section
      class="map-popout-shell"
      role="dialog"
      aria-modal="true"
      aria-label="Expanded project map"
    >
      <div class="map-popout-backdrop" onclick={handleCloseMapExpanded}></div>

      <div class="map-popout-panel">
        <div class="map-popout-header">
          <div class="map-popout-title-wrap">
            <div class="map-popout-title">Project Map</div>
            <template if:true={hasConfiguredLayers}>
              <div class="map-popout-subtitle">{mapSummaryText}</div>
            </template>
          </div>

          <div class="map-popout-actions">
            <lightning-button
              label="Refresh"
              title="Reload the current project map data"
              onclick={handleRefreshClick}
              disabled={isLoading}
            ></lightning-button>

            <button
              class="map-expand-button map-expand-button-close"
              type="button"
              title="Close expanded map"
              aria-label="Close expanded map"
              onclick={handleCloseMapExpanded}
            >
              <span class="map-expand-button-icon" aria-hidden="true">×</span>
            </button>
          </div>
        </div>

        <div class="map-popout-body">
          <div class={mapPopoutContentGridClass}>
            <template if:true={showSidePanelInPopout}>
              <div class="side-panel side-panel-popout">
                <div class="side-panel-header">
                  <div class="side-panel-heading">Layers</div>

                  <lightning-button-icon
                    icon-name={sidebarToggleIconName}
                    alternative-text={sidebarToggleTitle}
                    title={sidebarToggleTitle}
                    onclick={handleToggleSidebar}
                    disabled={isLoading}
                  ></lightning-button-icon>
                </div>

                <template if:true={hasSelectedLayers}>
                  <div class="side-panel-section">
                    <div class="side-panel-section-heading">Shown in Pane</div>

                    <template for:each={uiLayers} for:item="layer">
                      <section key={layer.mapLayerId} class="layer-card">
                        <div class="layer-card-header">
                          <div class="layer-card-title-wrap">
                            <div class="layer-card-title-row">
                              <div class="layer-card-title">{layer.mapLayerName}</div>

                              <template if:true={layer.isDefaultSelected}>
                                <span class="layer-default-badge">Default</span>
                              </template>
                            </div>

                            <div class="layer-card-subtitle">
                              {layer.visibleFeatureCount} visible feature(s)
                            </div>
                          </div>

                          <div class="layer-card-actions">
                            <template if:true={layer.hasFilterControl}>
                              <button
                                class="layer-icon-button"
                                type="button"
                                data-layer-id={layer.mapLayerId}
                                data-filter-trigger="true"
                                onclick={handleToggleFilterPanel}
                                title="Adjust layer filters"
                                aria-label="Adjust layer filters"
                              >
                                <lightning-icon
                                  icon-name="utility:filterList"
                                  size="x-small"
                                  alternative-text="Filters"
                                ></lightning-icon>
                              </button>
                            </template>

                            <button
                              class="layer-visibility-button layer-visibility-button-visible"
                              type="button"
                              data-layer-id={layer.mapLayerId}
                              onclick={handleRemoveLayerFromPane}
                              title="Remove layer from pane"
                              aria-label="Remove layer from pane"
                            >
                              Remove
                            </button>
                          </div>
                        </div>

                        <template if:true={layer.hasFilterControl}>
                          <div class="layer-filter-summary-row">
                            <div class="layer-filter-summary-label">Filters</div>
                            <div class="layer-filter-summary-value">{layer.filterSummaryText}</div>
                          </div>
                        </template>

                        <template if:true={layer.hasError}>
                          <div class="message message-error layer-inline-message">
                            <div class="message-title">Layer Error</div>
                            <div>{layer.errorMessage}</div>
                          </div>
                        </template>

                        <template if:true={layer.hasWarnings}>
                          <div class="warning-list">
                            <template for:each={layer.warnings} for:item="warning">
                              <div key={warning} class="message message-warning layer-inline-message">
                                <div>{warning}</div>
                              </div>
                            </template>
                          </div>
                        </template>

                        <template if:true={layer.isFilterPanelOpen}>
                          <div class="layer-filter-panel" data-filter-panel="true">
                            <div class="layer-filter-panel-header">
                              <div class="layer-filter-panel-title">Layer Filters</div>

                              <button
                                class="layer-filter-clear-button"
                                type="button"
                                data-layer-id={layer.mapLayerId}
                                onclick={handleClearLayerFilters}
                                title="Clear all filters"
                                aria-label="Clear all filters"
                              >
                                Clear
                              </button>
                            </div>

                            <template for:each={layer.filterFields} for:item="filterField">
                              <template if:true={filterField.hasOptions}>
                                <section key={filterField.fieldPath} class="layer-filter-group">
                                  <div class="layer-filter-group-header">
                                    <div class="layer-filter-field-label">{filterField.fieldLabel}</div>

                                    <template if:true={filterField.hasSelectedValues}>
                                      <div class="layer-filter-field-summary">
                                        {filterField.selectedSummaryText}
                                      </div>
                                    </template>
                                  </div>

                                  <div class="layer-filter-option-list">
                                    <template for:each={filterField.options} for:item="option">
                                      <label key={option.value} class="layer-filter-option">
                                        <input
                                          type="checkbox"
                                          checked={option.checked}
                                          data-layer-id={layer.mapLayerId}
                                          data-field-path={filterField.fieldPath}
                                          data-value={option.value}
                                          onchange={handleLayerFilterOptionChange}
                                        />
                                        <span>{option.label}</span>
                                      </label>
                                    </template>
                                  </div>
                                </section>
                              </template>
                            </template>
                          </div>
                        </template>
                      </section>
                    </template>
                  </div>
                </template>

                <template if:true={hasAvailableLayersToAdd}>
                  <div class="side-panel-section">
                    <div class="side-panel-section-heading">Available to Add</div>

                    <template for:each={availableLayersToAdd} for:item="layer">
                      <section key={layer.mapLayerId} class="layer-card layer-card-available">
                        <div class="layer-card-header">
                          <div class="layer-card-title-wrap">
                            <div class="layer-card-title-row">
                              <div class="layer-card-title">{layer.mapLayerName}</div>

                              <template if:true={layer.isDefaultSelected}>
                                <span class="layer-default-badge">Default</span>
                              </template>
                            </div>
                          </div>

                          <div class="layer-card-actions">
                            <button
                              class="layer-visibility-button layer-visibility-button-hidden"
                              type="button"
                              data-layer-id={layer.mapLayerId}
                              onclick={handleAddLayerToPane}
                              title="Add layer to pane"
                              aria-label="Add layer to pane"
                            >
                              Add
                            </button>
                          </div>
                        </div>
                      </section>
                    </template>
                  </div>
                </template>
              </div>
            </template>

            <div class="map-panel map-panel-popout">
              <template if:true={showCollapsedSidebarHandleInPopout}>
                <div class="collapsed-sidebar-handle">
                  <lightning-button-icon
                    icon-name={sidebarToggleIconName}
                    alternative-text={sidebarToggleTitle}
                    title={sidebarToggleTitle}
                    onclick={handleToggleSidebar}
                    disabled={isLoading}
                  ></lightning-button-icon>
                </div>
              </template>

              <div class="map-overlay-actions map-overlay-actions-popout">
                <button
                  class="map-expand-button map-lasso-button"
                  type="button"
                  title={lassoButtonTitle}
                  aria-label={lassoButtonTitle}
                  onclick={handleToggleLassoMode}
                  disabled={isLassoButtonDisabled}
                >
                  <span class="map-expand-button-icon" aria-hidden="true">{lassoButtonIcon}</span>
                </button>

                <button
                  class="map-expand-button"
                  type="button"
                  title={mapExpandButtonTitle}
                  aria-label={mapExpandButtonTitle}
                  onclick={handleToggleMapExpanded}
                >
                  <span class="map-expand-button-icon" aria-hidden="true">{mapExpandButtonIcon}</span>
                </button>
              </div>

              <div class="map-frame map-frame-popout">
                <div data-id="map" class="map-root" style={mapStyle} lwc:dom="manual"></div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>
  </template>

  <template if:true={isWorkLogModalOpen}>
    <c-project-record-map-work-log-modal
      project-id={recordId}
      target-record-id={workLogModalTargetRecordId}
      target-object-api-name={workLogModalTargetObjectApiName}
      feature-name={workLogModalFeatureName}
      field-set-api-name={workLogFieldSetApiName}
      site-detail-field-set-api-name={siteDetailFieldSetApiName}
      segment-detail-field-set-api-name={segmentDetailFieldSetApiName}
      onclose={handleWorkLogModalClose}
    ></c-project-record-map-work-log-modal>
  </template>

  <template if:true={isBulkWorkLogModalOpen}>
    <c-project-record-map-bulk-work-log-modal
      project-id={recordId}
      selections={bulkWorkLogSelections}
      onclose={handleBulkWorkLogModalClose}
      oncreated={handleBulkWorkLogCreated}
    ></c-project-record-map-bulk-work-log-modal>
  </template>
</template>
