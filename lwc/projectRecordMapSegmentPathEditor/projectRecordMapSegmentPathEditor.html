<template>
  <div class="prm-segment-editor-shell">
    <div class="prm-segment-editor-header">
      <div class="prm-segment-editor-title-wrap">
        <div class="prm-segment-editor-title">Segment completion</div>
        <div class="prm-segment-editor-subtitle">{helperText}</div>
      </div>

      <div class="prm-segment-editor-actions">
        <div class="prm-segment-editor-button-group">
          <button
            class={fullButtonClass}
            type="button"
            onclick={handleSelectFull}
            aria-pressed={isFullMode}
          >
            Full Segment
          </button>
          <button
            class={partialButtonClass}
            type="button"
            onclick={handleSelectPartial}
            aria-pressed={isPartialMode}
            disabled={disablePartialModeButton}
          >
            Partial Segment
          </button>
        </div>

        <template if:true={isPartialMode}>
          <div class="prm-segment-editor-button-group prm-segment-editor-button-group-utility">
            <button
              class={utilityButtonClass}
              type="button"
              onclick={handleUndoPartial}
              disabled={disableUndoButton}
            >
              Undo
            </button>
            <button
              class={utilityButtonClass}
              type="button"
              onclick={handleClearPartial}
              disabled={disableClearButton}
            >
              Clear
            </button>
          </div>
        </template>
      </div>
    </div>

    <template if:true={errorMessage}>
      <div class="message message-warning">
        <div class="message-title">Segment Geometry</div>
        <div>{errorMessage}</div>
      </div>
    </template>

    <template if:true={hasSegmentGeometry}>
      <div class="prm-segment-map-frame">
        <div
          data-id="segment-map"
          class="prm-segment-map-root"
          style={mapStyle}
          lwc:dom="manual"
        ></div>
      </div>
    </template>
  </div>
</template>
